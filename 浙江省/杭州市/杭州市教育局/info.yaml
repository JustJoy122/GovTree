# ============================================
# 简要描述
# 概括机构的主要职能，便于快速了解
# ============================================
description: >
  杭州市教育局是杭州市人民政府主管教育事业和语言文字工作的组成部门，
  与中共杭州市委教育工作委员会合署办公，实行“一个机构，两块牌子”。
  主要负责全市教育事业和语言文字工作，统筹教育系统党建、教育教学改革、
  教育督导、教师队伍建设等职责。

