# ============================================
# 简要描述
# ============================================
description: >
  浙江省教育厅是主管全省教育事业和语言文字工作的浙江省人民政府组成部门，
  与中共浙江省委教育工作委员会合署办公。主要负责贯彻执行党和国家的教育方针、
  政策和法律法规，统筹规划全省教育事业，指导各级各类学校的教育教学改革。

