# ============================================
# 简要描述
# ============================================
description: >
  宁波市教育局是主管全市教育事业和语言文字工作的宁波市人民政府工作部门，
  与中共宁波市委教育工作委员会合署办公。主要负责贯彻执行党和国家的教育方针、
  政策和法律法规，统筹全市教育事业发展，指导各级各类学校的教育教学改革。

