# ============================================
# 机构基本信息
# ============================================
name: "杭州市西湖区教育局"         # 机构全称
type: "机关"                      # 分类：机关

# ============================================
# 行政级别
# 杭州市辖区为副厅级，区属工作部门通常为正处级
# 但由于杭州整体升格，西湖区教育局在实际操作中按正处级配置
# ============================================
rank:
  value: 7                        # 正处级
  label: "正处级"                 # 区县教育局一般正科级，但杭州因副省级城市高配一级

# ============================================
# 公开网址
# ============================================
website: "http://www.hzxh.gov.cn"

# ============================================
# 联系方式
# ============================================
contact:
  address: "浙江省杭州市西湖区灵隐街道外东山弄59号"
  postal_code: "310013"
  phone: "0571-89511742"          # 办公室电话（公开征求意见通知中使用）
  education_phone: "0571-89511751"  # 招生入学咨询电话，可能高频使用
  # 教育局其他科室电话可后续补充

# ============================================
# 主要负责人
# 据2026年初变动后信息
# ============================================
leadership:
  - title: "党委书记、局长"
    name: "汪培新"
    note: "主持党政全面工作。"
  # 注：西湖区教育局最早于2012年文件明确“局长（书记）1-2名，副局长3名”
  # 目前可确认汪培新为核心主要负责人

# ============================================
# 简要描述
# ============================================
description: >
  杭州市西湖区教育局是西湖区人民政府主管教育的工作部门，
  与区委教育工作委员会合署办公。主要承担全区学前教育、基础教育、
  职业教育的统筹管理职责，组织实施教师资格认定、教育督导评估
  及校园安全监管工作，并负责语言文字规范化应用指导。

# ============================================
# 内设机构（仅罗列本级下设科室名称，为后续扩展提供参考）
# ============================================
internal_org:
  - "办公室"
  - "组织人事科"
  - "计划基建财务科"
  - "基础教育科"
  - "学前教育科"
  - "督导科"
  - "校园安全科"
  # 科室数量可能对应文件中的“科（室）领导职数12名”，部分科室后续可根据实际调整

# ============================================
# 扩展信息区
# ============================================
extra:
  行政编制: 24                    # 2012年“三定”方案核定
  科（室）领导职数: 12
  辖区面积（平方公里）: 316       # 根据公开资料
  # 未来可补充其他公开信息
